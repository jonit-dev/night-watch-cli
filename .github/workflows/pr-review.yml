name: PR Review
on:
  pull_request:
    types: [opened, synchronize, labeled, unlabeled]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Load shared review prompt
        id: review_prompt
        shell: bash
        run: |
          {
            echo 'prompt<<EOF'
            cat .github/prompts/pr-review.md
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: AI PR Review
        uses: jonit-dev/openrouter-github-action@main
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          open_router_key: ${{ secrets.OPEN_ROUTER_KEY }}
          model_id: 'z-ai/glm-5'
          # model_id: 'openai/gpt-5.2-codex'
          # reasoning_effort: 'xhigh'
          max_tokens: '4096'
          max_pr_reviews: '2'
          cooldown_period: '5'
          custom_prompt: ${{ steps.review_prompt.outputs.prompt }}
